<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>出発ルーティン・アシスタント</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f3ec;
      color: #292524;
    }
    .app {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      background: #fbf8f2;
      padding-bottom: 96px;
      box-shadow: 0 0 28px rgba(0,0,0,.08);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(251,248,242,.96);
      border-bottom: 1px solid #eee5d8;
      padding: 22px 20px 16px;
      backdrop-filter: blur(8px);
    }
    h1 { font-size: 24px; margin: 0; }
    h2 { font-size: 28px; margin: 0 0 10px; }
    h3 { font-size: 22px; margin: 0 0 14px; }
    .flow { text-align: center; font-size: 13px; font-weight: 700; color: #78716c; margin-top: 10px; }
    .clock-card {
      margin-top: 14px;
      background: white;
      border: 1px solid #e7ded2;
      border-radius: 24px;
      padding: 14px;
      text-align: center;
    }
    .date { font-weight: 800; font-size: 17px; }
    .clock { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 36px; font-weight: 900; margin-top: 6px; }
    main { padding: 20px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid #e7ded2;
      box-shadow: 0 4px 14px rgba(0,0,0,.04);
    }
    .white { background: white; }
    .school { background:#f1f5f9; border-color:#cbd5e1; }
    .hula { background:#fff1f2; border-color:#fecdd3; }
    .hospital { background:#ecfdf5; border-color:#a7f3d0; }
    .shopping { background:#f5f5f4; border-color:#d6d3d1; }
    .default { background:#fafaf9; border-color:#e7e5e4; }
    .soft { background: rgba(255,255,255,.65); }
    .title-row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .big-title { font-size: 30px; font-weight: 900; letter-spacing: -.03em; }
    .big-time { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 36px; font-weight: 900; }
    .muted { color:#78716c; font-weight:700; font-size:14px; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 15px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }
    .primary { background:#047857; color:white; box-shadow:0 6px 14px rgba(4,120,87,.18); }
    .secondary { background:#e7e5e4; color:#44403c; }
    .danger { background:rgba(255,255,255,.7); color:#78716c; font-size:13px; padding:9px 14px; width:auto; }
    .chip {
      border:0;
      border-radius:999px;
      padding:9px 12px;
      background:#e7e5e4;
      font-weight:800;
      cursor:pointer;
    }
    .chip-delete {
      border:1px solid #e7e5e4;
      background:white;
      border-radius:999px;
      padding:5px 8px;
      cursor:pointer;
    }
    .badge {
      display:inline-block;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .waiting { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }
    .done { background:#bbf7d0; color:#065f46; border:1px solid #86efac; }
    .field {
      background:rgba(255,255,255,.7);
      border-radius:20px;
      padding:15px;
      margin-top:12px;
    }
    .field-label { font-size:12px; font-weight:800; color:#78716c; margin-bottom:8px; }
    .chooser {
      width:100%;
      background:white;
      border:1px solid #e7e5e4;
      border-radius:14px;
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:28px;
      font-weight:900;
      cursor:pointer;
    }
    .change-pill {
      font-size:13px;
      background:#f5f5f4;
      border:1px solid #e7e5e4;
      border-radius:999px;
      padding:6px 10px;
      color:#57534e;
    }
    .panel { display:none; margin-top:12px; }
    .panel.open { display:block; }
    input, select {
      width:100%;
      border:1px solid #d6d3d1;
      border-radius:14px;
      padding:12px;
      font-size:16px;
      background:white;
    }
    .large-input { font-size:24px; font-weight:900; padding:15px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .items { display:flex; flex-wrap:wrap; gap:8px; }
    .item-line { display:flex; gap:8px; margin-bottom:8px; }
    .item-line input { flex:1; }
    .progress-bg { height:14px; background:#e7e5e4; border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; background:#047857; width:0%; }
    .nav {
      position:fixed;
      left:50%;
      bottom:0;
      transform:translateX(-50%);
      max-width:430px;
      width:100%;
      background:rgba(255,255,255,.96);
      border-top:1px solid #e7e5e4;
      padding:10px 14px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      align-items:end;
    }
    .nav button {
      border:0;
      border-radius:18px;
      background:transparent;
      padding:10px 4px;
      font-weight:900;
      color:#78716c;
      cursor:pointer;
    }
    .nav button.active { background:#e7e5e4; color:#292524; }
    .nav .fab {
      margin-top:-34px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }
    .fab-circle {
      width:76px;
      height:76px;
      border-radius:50%;
      background:#047857;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }
    .small { font-size:12px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>出発ルーティン・アシスタント</h1>
    <div class="flow">明日の準備 → 確認開始 → 出発</div>
    <div class="clock-card">
      <div class="date" id="dateText"></div>
      <div class="clock" id="clockText"></div>
    </div>
  </header>

  <main>
    <section id="screen-prep" class="screen"></section>
    <section id="screen-check" class="screen active"></section>
    <section id="screen-confirm" class="screen"></section>
    <section id="screen-settings" class="screen"></section>
  </main>

  <nav class="nav">
    <button id="nav-prep" onclick="showScreen('prep')">📋<br>明日の準備</button>
    <button id="nav-check" class="fab active" onclick="showScreen('check')">
      <span class="fab-circle">✅</span>
      <span class="small">確認開始</span>
    </button>
    <button id="nav-settings" onclick="showScreen('settings')">⚙️<br>設定</button>
  </nav>
</div>

<script>
let state = {
  screen: "check",
  now: new Date(),
  dailyItems: ["鍵", "スマホ", "財布"],
  templates: [
    { id:"school", name:"学校セット", items:["筆箱","ノート","水筒"] },
    { id:"hula", name:"フラセット", items:["パウ","水筒","ノート"] },
    { id:"hospital", name:"通院セット", items:["診察券","保険証","お薬手帳"] },
    { id:"shopping", name:"買い物セット", items:["エコバッグ","ポイントカード"] }
  ],
  events: [
    { id:1, title:"学校", time:"08:00", icon:"🏫", templateId:"school", specialItems:["申込書"], checked:false },
    { id:2, title:"フラ", time:"17:30", icon:"🌺", templateId:"hula", specialItems:[], checked:false },
    { id:3, title:"通院", time:"19:00", icon:"🏥", templateId:"hospital", specialItems:["保険証"], checked:false }
  ],
  eventNameOptions: [
    { name:"学校", icon:"🏫" },
    { name:"フラ", icon:"🌺" },
    { name:"通院", icon:"🏥" },
    { name:"買い物", icon:"🛒" },
    { name:"習い事", icon:"📚" }
  ],
  quickItems:["申込書","保険証","レインコート","水筒"],
  templateExclusions:{},
  selectedEventId:1,
  confirmIndex:0,
  completed:false,
  notYet:false,
  voiceEnabled:true,
  prepReminderEnabled:true,
  prepReminderTime:"23:00",
  prepDoneToday:false,
  showAdd:false
};

const themeMap = {
  "学校": { card:"school", soft:"school", icon:"🏫" },
  "フラ": { card:"hula", soft:"hula", icon:"🌺" },
  "通院": { card:"hospital", soft:"hospital", icon:"🏥" },
  "買い物": { card:"shopping", soft:"shopping", icon:"🛒" },
  "習い事": { card:"default", soft:"default", icon:"📚" }
};
const getTheme = title => themeMap[title] || { card:"default", soft:"default", icon:"🗓️" };

function toMinutes(time){
  const [h,m]=time.split(":").map(Number);
  return h*60+m;
}
function minutesUntil(time){
  const now = new Date();
  return toMinutes(time) - (now.getHours()*60 + now.getMinutes());
}
function formatUntil(mins){
  if(mins < 0) return "出発時刻を過ぎています";
  if(mins < 60) return `出発まで${mins}分`;
  const h=Math.floor(mins/60), m=mins%60;
  return m ? `あと${h}時間${m}分` : `あと${h}時間`;
}
function templateOf(event){
  return state.templates.find(t=>t.id===event.templateId);
}
function sortedEvents(){
  return [...state.events].sort((a,b)=>toMinutes(a.time)-toMinutes(b.time));
}
function nextEvent(){
  const events = sortedEvents();
  return events.find(e=>minutesUntil(e.time)>=0 && !e.checked) ||
         events.find(e=>minutesUntil(e.time)>=0) ||
         events[0];
}
function confirmItems(event){
  const template = templateOf(event);
  const excluded = state.templateExclusions[event.id] || [];
  const templateItems = (template?.items || []).filter(i=>!excluded.includes(i));
  return [
    ...(event.specialItems || []).map(name=>({name, category:"今日だけ"})),
    ...templateItems.map(name=>({name, category:template?.name || "シーン別セット"})),
    ...state.dailyItems.map(name=>({name, category:"毎日"}))
  ];
}
function badge(checked){
  return `<span class="badge ${checked ? 'done' : 'waiting'}">${checked ? '✓ 確認完了' : '○ 確認待ち'}</span>`;
}
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function showScreen(screen){
  state.screen = screen;
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+screen).classList.add("active");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-"+(screen==="confirm"?"check":screen))?.classList.add("active");
  render();
}

function updateClock(){
  const now = new Date();
  const date = `${now.getFullYear()}年 ${now.getMonth()+1}月${now.getDate()}日（${now.toLocaleDateString("ja-JP",{weekday:"short"}).replace("曜","")}）`;
  document.getElementById("dateText").textContent = date;
  document.getElementById("clockText").textContent = now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
setInterval(updateClock,1000);

function render(){
  renderPrep();
  renderCheck();
  renderConfirm();
  renderSettings();
  updateClock();
}

function renderPrep(){
  const el=document.getElementById("screen-prep");
  el.innerHTML = `
    <h2>明日の準備</h2>
    <div class="card white">
      <h3>毎日持つもの</h3>
      <div class="items">${state.dailyItems.map(i=>`<span class="chip">${escapeHtml(i)}</span>`).join("")}</div>
    </div>

    <button class="btn primary" onclick="toggleAddEvent()">＋出発を追加</button>
    <div id="addEventBox">${state.showAdd ? addEventFormHtml() : ""}</div>

    ${state.events.map(eventCardHtml).join("")}
  `;
}
function toggleAddEvent(){ state.showAdd=!state.showAdd; renderPrep(); }

function addEventFormHtml(){
  return `
    <div class="card white">
      <h3>新しい出発を作る</h3>
      <div class="grid">
        ${state.eventNameOptions.slice(0,5).map((o,i)=>`
          <button class="chip" onclick="selectNewEventName(${i})">${o.icon} ${escapeHtml(o.name)}</button>
        `).join("")}
      </div>
      <input id="newCustomName" placeholder="＋新規入力" style="margin-top:10px">
      <input id="newTime" type="time" value="09:00" class="large-input" style="margin-top:10px">
      <select id="newTemplate" class="large-input" style="margin-top:10px">
        ${state.templates.map(t=>`<option value="${t.id}">${escapeHtml(t.name)}</option>`).join("")}
      </select>
      <button class="btn primary" style="margin-top:12px" onclick="addEvent()">この内容で追加</button>
    </div>
  `;
}
let tempNewName = null;
function selectNewEventName(i){ tempNewName = state.eventNameOptions[i]; }

function addEvent(){
  const custom = document.getElementById("newCustomName")?.value.trim();
  const selected = custom ? {name:custom, icon:"🗓️"} : (tempNewName || state.eventNameOptions[0]);
  const newEvent = {
    id: Date.now(),
    title: selected.name,
    icon: selected.icon,
    time: document.getElementById("newTime").value,
    templateId: document.getElementById("newTemplate").value,
    specialItems: [],
    checked:false
  };
  state.events.push(newEvent);
  if(custom && !state.eventNameOptions.some(o=>o.name===custom)){
    state.eventNameOptions = [...state.eventNameOptions.slice(0,4), selected];
  }
  state.showAdd=false;
  tempNewName=null;
  render();
}

function eventCardHtml(event){
  const template=templateOf(event);
  const excluded=state.templateExclusions[event.id] || [];
  const count=(template?.items||[]).filter(i=>!excluded.includes(i)).length + event.specialItems.length + state.dailyItems.length;
  return `
    <div class="card ${getTheme(event.title).card}">
      ${eventNameEditorHtml(event)}
      ${chooserHtml("出発時刻", `🕒 ${event.time}`, `time-${event.id}`, `<input type="time" value="${event.time}" onchange="updateEvent(${event.id},'time',this.value)">`)}
      ${chooserHtml("シーン別セット", `🎒 ${escapeHtml(template?.name || "未設定")}`, `template-${event.id}`, templateEditorHtml(event))}
      <div class="field">
        <div class="field-label" style="font-size:22px;color:#292524">今日だけ持ち物</div>
        ${specialItemsHtml(event)}
      </div>
      <div class="field"><strong>確認対象 ${count}点</strong></div>
      <button class="btn primary" onclick="startConfirm(${event.id})">確認する</button>
      <button class="danger" onclick="removeEvent(${event.id})">この出発準備を削除する</button>
    </div>
  `;
}
function chooserHtml(label, value, id, inner){
  return `
    <div class="field">
      <div class="field-label">${label}</div>
      <button class="chooser" onclick="togglePanel('${id}')">
        <span>${value}</span><span class="change-pill">変更</span>
      </button>
      <div class="panel" id="${id}">${inner}</div>
    </div>
  `;
}
function togglePanel(id){ document.getElementById(id)?.classList.toggle("open"); }

function eventNameEditorHtml(event){
  return `
    <div class="field">
      <div class="field-label">出発名</div>
      <button class="chooser" onclick="togglePanel('name-${event.id}')">
        <span>${event.icon} ${escapeHtml(event.title)}</span><span class="change-pill">変更</span>
      </button>
      <div class="panel" id="name-${event.id}">
        ${state.eventNameOptions.slice(0,5).map((o,i)=>`
          <div class="item-line">
            <button class="chip" style="flex:1;text-align:left" onclick="setEventName(${event.id},${i})">${o.icon} ${escapeHtml(o.name)}</button>
            <button class="chip" onclick="moveEventName(${i})">↑</button>
            <button class="chip" onclick="deleteEventName(${i})">×</button>
          </div>
        `).join("")}
        <input id="customName-${event.id}" placeholder="＋新規入力">
        <button class="btn primary" style="margin-top:8px" onclick="addCustomEventName(${event.id})">追加</button>
      </div>
    </div>
  `;
}
function setEventName(id,i){
  const opt=state.eventNameOptions[i];
  updateEvent(id,"title",opt.name);
  updateEvent(id,"icon",opt.icon);
}
function addCustomEventName(id){
  const name=document.getElementById("customName-"+id).value.trim();
  if(!name) return;
  const opt={name,icon:"🗓️"};
  state.eventNameOptions=[...state.eventNameOptions.slice(0,4),opt];
  updateEvent(id,"title",name);
  updateEvent(id,"icon","🗓️");
}
function moveEventName(i){
  if(i<=0) return;
  [state.eventNameOptions[i-1],state.eventNameOptions[i]]=[state.eventNameOptions[i],state.eventNameOptions[i-1]];
  render();
}
function deleteEventName(i){
  state.eventNameOptions.splice(i,1);
  render();
}

function templateEditorHtml(event){
  const template=templateOf(event);
  const excluded=state.templateExclusions[event.id] || [];
  return `
    <select class="large-input" onchange="updateEvent(${event.id},'templateId',this.value)">
      ${state.templates.map(t=>`<option value="${t.id}" ${t.id===event.templateId?"selected":""}>${escapeHtml(t.name)}</option>`).join("")}
    </select>
    <div style="margin-top:10px">
      ${(template?.items||[]).map(item=>{
        const off=excluded.includes(item);
        return `<button class="btn secondary" style="margin-top:6px" onclick="toggleExclude(${event.id},'${escapeHtml(item)}')">${off?"☐":"☑"} ${escapeHtml(item)} <span class="small">${off?"除外中":"確認対象"}</span></button>`;
      }).join("")}
    </div>
  `;
}
function toggleExclude(id,item){
  const list=state.templateExclusions[id] || [];
  state.templateExclusions[id] = list.includes(item) ? list.filter(x=>x!==item) : [...list,item];
  render();
}

function specialItemsHtml(event){
  return `
    ${(event.specialItems||[]).map((item,i)=>`
      <div class="item-line">
        <input value="${escapeHtml(item)}" onchange="updateSpecial(${event.id},${i},this.value)">
        <button class="chip" onclick="deleteSpecial(${event.id},${i})">削除</button>
      </div>
    `).join("")}
    <button class="btn" style="background:#fcd34d;margin-bottom:10px" onclick="addSpecial(${event.id},'新しい持ち物')">＋追加</button>
    <div class="field-label">候補</div>
    <div class="items">
      ${state.quickItems.map((item,i)=>`
        <span>
          <button class="chip" onclick="addSpecial(${event.id},'${escapeHtml(item)}')">${escapeHtml(item)}</button>
          <button class="chip-delete" onclick="deleteQuick(${i})">×</button>
        </span>
      `).join("")}
    </div>
  `;
}
function updateSpecial(id,i,value){
  const e=state.events.find(x=>x.id===id);
  e.specialItems[i]=value;
}
function deleteSpecial(id,i){
  const e=state.events.find(x=>x.id===id);
  e.specialItems.splice(i,1);
  render();
}
function addSpecial(id,item){
  const e=state.events.find(x=>x.id===id);
  if(!e.specialItems.includes(item)) e.specialItems.push(item);
  if(!state.quickItems.includes(item)) state.quickItems=[item,...state.quickItems].slice(0,10);
  render();
}
function deleteQuick(i){
  state.quickItems.splice(i,1);
  render();
}
function updateEvent(id,field,value){
  const e=state.events.find(x=>x.id===id);
  if(e) e[field]=value;
  render();
}
function removeEvent(id){
  state.events=state.events.filter(e=>e.id!==id);
  render();
}

function renderCheck(){
  const el=document.getElementById("screen-check");
  const next=nextEvent();
  if(!next){ el.innerHTML=`<div class="card white">出発予定がありません。</div>`; return; }
  el.innerHTML=`
    <h2>確認開始</h2>
    <div class="card ${getTheme(next.title).card}">
      <div class="title-row">
        <div>
          <div class="muted">次の出発</div>
          <div class="big-title">${next.icon} ${escapeHtml(next.title)}</div>
          <div class="big-time">${next.time}</div>
          <div class="muted">${formatUntil(minutesUntil(next.time))}</div>
        </div>
        ${badge(next.checked)}
      </div>
      <button class="btn primary" style="margin-top:16px" onclick="startConfirm(${next.id})">確認する</button>
    </div>
    ${sortedEvents().map(e=>`
      <button class="card ${getTheme(e.title).card}" style="width:100%;text-align:left" onclick="startConfirm(${e.id})">
        <div class="title-row">
          <div>
            <span class="big-time" style="font-size:18px">${e.time}</span>
            <span class="big-title" style="font-size:24px">${e.icon} ${escapeHtml(e.title)}</span>
            <div class="muted">${escapeHtml(templateOf(e)?.name || "未設定")} ・ ${formatUntil(minutesUntil(e.time))}</div>
          </div>
          ${badge(e.checked)}
        </div>
      </button>
    `).join("")}
  `;
}

function startConfirm(id){
  state.selectedEventId=id;
  state.confirmIndex=0;
  state.completed=false;
  state.notYet=false;
  showScreen("confirm");
  setTimeout(()=>speakCurrent(),250);
}
function speak(text){
  if(!state.voiceEnabled || !("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  u.rate=.9;
  window.speechSynthesis.speak(u);
}
function speechText(item){
  if(item.category==="今日だけ"){
    return `今日は特別な持ち物があります。${item.name}です。もう一度確認します。${item.name}。`;
  }
  return `${item.name}、持った？`;
}
function speakCurrent(){
  const e=state.events.find(x=>x.id===state.selectedEventId);
  const item=confirmItems(e)[state.confirmIndex];
  if(item) speak(speechText(item));
}
function renderConfirm(){
  const el=document.getElementById("screen-confirm");
  const event=state.events.find(e=>e.id===state.selectedEventId) || nextEvent();
  if(!event){ el.innerHTML=`<div class="card white">確認する出発がありません。</div>`; return; }
  const items=confirmItems(event);
  if(!items.length){ el.innerHTML=`<div class="card white">確認する持ち物がありません。</div>`; return; }

  if(state.completed){
    el.innerHTML=`
      <div class="card ${getTheme(event.title).card}" style="text-align:center">
        <div style="font-size:52px">✅</div>
        <div class="badge done">${escapeHtml(event.title)} チェック済み</div>
        <h2>出発確認完了！</h2>
        <p class="muted">落ち着いて出発できます。</p>
      </div>
    `;
    return;
  }
  const item=items[state.confirmIndex];
  const progress=Math.round((state.confirmIndex/items.length)*100);
  el.innerHTML=`
    <div class="title-row">
      <h2>${event.icon} ${escapeHtml(event.title)}の確認</h2>
      <button class="chip" onclick="toggleVoice()">音声 ${state.voiceEnabled?"ON":"OFF"}</button>
    </div>
    <div class="card white">
      <div class="title-row muted"><span>進捗</span><span>${state.confirmIndex+1} / ${items.length}確認中</span></div>
      <div class="progress-bg"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="card ${getTheme(event.title).card}" style="text-align:center">
      <button class="chip" style="font-size:34px;width:80px;height:80px" onclick="speakCurrent()">🔊</button>
      <p class="muted">タップで再読み上げ</p>
      <h2>${escapeHtml(item.name)}、<br>持った？</h2>
      <span class="chip">${escapeHtml(item.category)}</span>
    </div>
    ${state.notYet ? `<div class="card white"><strong>大丈夫です。</strong><p class="muted">取りに行ってから、もう一度確認しましょう。</p></div>` : ""}
    <button class="btn primary" onclick="confirmGotIt()">持った</button>
    <button class="btn secondary" style="margin-top:10px" onclick="state.notYet=true; renderConfirm()">まだ</button>
  `;
}
function toggleVoice(){ state.voiceEnabled=!state.voiceEnabled; renderConfirm(); }
function confirmGotIt(){
  const event=state.events.find(e=>e.id===state.selectedEventId);
  const items=confirmItems(event);
  if(state.confirmIndex+1 >= items.length){
    event.checked=true;
    state.completed=true;
    speak("出発確認完了です。いってらっしゃい。");
  } else {
    state.confirmIndex++;
    state.notYet=false;
    setTimeout(()=>speakCurrent(),150);
  }
  renderConfirm();
}

function renderSettings(){
  const el=document.getElementById("screen-settings");
  el.innerHTML=`
    <div class="card white">
      <h3>夜の準備リマインド</h3>
      <div class="title-row">
        <strong>通知</strong>
        <button class="chip" onclick="toggleReminder()">${state.prepReminderEnabled?"ON":"OFF"}</button>
      </div>
      <input type="time" value="${state.prepReminderTime}" onchange="state.prepReminderTime=this.value" style="margin-top:10px">
      <div class="card" style="background:#f7f3ec;margin-top:10px">「明日の準備はできましたか？」</div>
      ${state.prepDoneToday ? `<div class="card hospital">今日は準備完了のため通知停止</div>` : ""}
      <button class="btn secondary" onclick="showScreen('prep')">通知タップを試す（明日の準備へ）</button>
    </div>

    <h2>設定</h2>
    <div class="card white">
      <h3>毎日持つもの</h3>
      ${state.dailyItems.map((item,i)=>`
        <div class="item-line">
          <input value="${escapeHtml(item)}" onchange="state.dailyItems[${i}]=this.value">
          <button class="chip" onclick="state.dailyItems.splice(${i},1); renderSettings(); renderPrep()">削除</button>
        </div>
      `).join("")}
      <button class="btn secondary" onclick="state.dailyItems.push('新しい持ち物'); renderSettings(); renderPrep()">追加</button>
    </div>

    <div class="card white">
      <h3>シーン別セット</h3>
      <button class="btn secondary" onclick="addTemplate()">追加</button>
      ${state.templates.map((t,ti)=>`
        <div class="card" style="background:#f7f3ec">
          <div class="item-line">
            <input value="${escapeHtml(t.name)}" onchange="state.templates[${ti}].name=this.value">
            <button class="chip" onclick="state.templates.splice(${ti},1); renderSettings(); renderPrep()">削除</button>
          </div>
          ${t.items.map((item,ii)=>`
            <div class="item-line">
              <input value="${escapeHtml(item)}" onchange="state.templates[${ti}].items[${ii}]=this.value">
              <button class="chip" onclick="state.templates[${ti}].items.splice(${ii},1); renderSettings(); renderPrep()">削除</button>
            </div>
          `).join("")}
          <button class="btn secondary" onclick="state.templates[${ti}].items.push('新しい持ち物'); renderSettings(); renderPrep()">持ち物を追加</button>
        </div>
      `).join("")}
    </div>
  `;
}
function toggleReminder(){ state.prepReminderEnabled=!state.prepReminderEnabled; renderSettings(); }
function addTemplate(){
  state.templates.push({id:"template-"+Date.now(), name:"新しいセット", items:["新しい持ち物"]});
  renderSettings();
}

function checkReminderMock(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,"0");
  const mm=String(now.getMinutes()).padStart(2,"0");
  if(state.prepReminderEnabled && !state.prepDoneToday && `${hh}:${mm}`===state.prepReminderTime){
    console.log("明日の準備はできましたか？");
  }
}
setInterval(checkReminderMock,60000);

render();
updateClock();
</script>
</body>
</html>
